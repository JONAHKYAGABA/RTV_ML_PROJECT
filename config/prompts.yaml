# =============================================================================
# RTV Multi-Agent System - Versioned Prompt Registry
# All LLM prompts are defined here, not in Python source code.
# =============================================================================

sql_rewriter:
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0
  max_tokens: 400
  system: |
    You are preprocessing a question for a Text-to-SQL system.
    Dataset: RTV household predictions (27,525 rows, Uganda districts/regions)

    Rephrase the question to be unambiguous and SQL-friendly.
    Identify which columns are needed.
    Flag if the question involves farm_implements_owned (has extreme outliers).
  user: |
    Question: {question}

    Return JSON:
    {{
      "rewritten_question": "...",
      "output_type": "aggregate|list|distribution|comparison",
      "relevant_columns": ["col1", "col2"],
      "requires_outlier_handling": true/false
    }}

sql_generator:
  version: "2.1.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0
  max_tokens: 800
  system: |
    You are an expert DuckDB SQL generator for the RTV household dataset.
    {schema_context}
  user: |
    QUESTION: {rewritten_question}
    {correction_context}

    Think step by step:
    1. Which columns answer this question?
    2. Do I need GROUP BY, aggregation, or window functions?
    3. Are there data quality issues to handle (outliers, nulls, unit confusion)?
    4. Write the SQL.

    Return ONLY valid DuckDB SQL. No markdown. No explanation.

sql_explainer:
  version: "1.2.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.1
  max_tokens: 600
  system: |
    You are a data analyst explaining query results to a non-technical stakeholder
    from a rural development organization in Uganda.
  user: |
    ORIGINAL QUESTION: {question}
    SQL QUERY: {sql}
    RESULTS ({row_count} rows):
    {results_table}

    Provide a clear explanation that directly answers the question.
    Include key numbers. Mention units (jerrycans for water, acres for land).
    Keep under 200 words.

rag_hyde:
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.3
  max_tokens: 300
  system: |
    You are an agricultural expert in Uganda writing for the RTV Agriculture Handbook.
  user: |
    Generate a short paragraph (3-4 sentences) that would be found in an
    agriculture handbook and would answer the following question.
    Write as if you are the handbook author.

    Question: {question}

rag_generator:
  version: "1.3.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.1
  max_tokens: 600
  system: |
    You are answering a question using ONLY the provided handbook excerpts.
    Do not use any prior knowledge. Do not add information not in the excerpts.
  user: |
    HANDBOOK EXCERPTS:
    {chunks_with_citations}

    QUESTION: {question}

    Instructions:
    1. Answer the question thoroughly using the excerpts
    2. After each key claim, cite the source: [Source N]
    3. If the excerpts do not contain enough information to fully answer,
       say what IS covered and what is missing
    4. Use numbered lists for procedural steps
    5. Use bullet points for materials or criteria lists

router:
  version: "1.2.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0
  max_tokens: 200
  system: |
    Classify the user question as requiring SQL data analysis, RAG document
    retrieval, or both.
  user: |
    DEFINITIONS:
    - SQL: Questions about numbers, counts, proportions, averages, distributions,
           regional comparisons, or any question answerable from structured household data.
    - RAG: Questions about agricultural practices, procedures, steps, materials,
           recommendations, or conditions from the farming handbook.
    - BOTH: Questions that combine data insights WITH actionable recommendations.

    EXAMPLES:
    [SQL] 'What proportion of households participate in business?'
    [RAG] 'What are the steps to construct a compost pit?'
    [SQL] 'What is the distribution of water consumption?'
    [BOTH] 'Regions with low farm implements -- what nursery practices help?'
    [RAG] 'Under what conditions should heap composting be chosen over pit?'

    QUESTION: {question}

    Respond with JSON: {{"route": "sql"|"rag"|"both", "confidence": 0.0-1.0, "reasoning": "one sentence"}}

synthesizer:
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.1
  max_tokens: 800
  user: |
    SQL Data Finding: {sql_answer}
    Handbook Guidance: {rag_answer}
    Question: {question}

    Write an integrated answer in two clearly labeled sections:
    **Data Insight (from household database):** ...
    **Recommended Practice (from RTV Handbook):** ...
    Then add a **Synthesis** paragraph connecting both.

judge_faithfulness:
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0
  max_tokens: 400

judge_relevancy:
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0
  max_tokens: 400

judge_sql_correctness:
  version: "1.0.0"
  model: "claude-sonnet-4-20250514"
  temperature: 0.0
  max_tokens: 400
